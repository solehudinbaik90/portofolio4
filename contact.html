    <section class="contact">
        <h1 class="heading"><span>kontak</span></h1>
        <div class="contact-row">

            <!-- Kolom 1: Info Kontak -->
            <div class="column form-column">
                <hr class="divider">
                <h2>hubungi saya</h2>
                <hr class="divider">

                <div class="box-container">
                    <div class="box">
                        <p>👋 Senang berkenalan dengan Anda!</p>
                    </div>
                </div>

                <div class="box-container">
                    <div class="box">
                        <div class="share">
                            <a target="_blank" href="https://www.facebook.com/soleh.muhamad" class="bi bi-facebook" title="Facebook"></a>
                            <a target="_blank" href="https://www.facebook.com/soleh.muhamad" class="bi bi-instagram" title="Instagram"></a>
                            <a target="_blank" href="https://www.facebook.com/soleh.muhamad" class="bi bi-linkedin" title="LinkedIn"></a>
                            <a target="_blank" href="https://www.facebook.com/soleh.muhamad" class="bi bi-github" title="GitHub"></a>
                            <a target="_blank" href="https://www.facebook.com/soleh.muhamad" class="bi bi-youtube" title="YouTube"></a>
                            <a target="_blank" href="https://www.facebook.com/soleh.muhamad" class="bi bi-telegram" title="Telegram"></a>
                            <a target="_blank" href="https://www.facebook.com/soleh.muhamad" class="bi bi-tiktok" title="TikTok"></a>
                        </div>
                    </div>
                </div>

                <div class="box-container">
                    <div class="box">
                        <div class="info">
                            <h3><i class="fas fa-map"></i> Alamat :</h3>
                            <p>Jungkel, Rajeg</p>
                        </div>
                    </div>
                    <div class="box">
                        <div class="info">
                            <h3><i class="fas fa-envelope"></i> Email :</h3>
                            <p>solehudinz3692@gmail.com</p>
                        </div>
                    </div>
                    <div class="box">
                        <div class="info">
                            <h3><i class="fas fa-phone"></i> No. HP :</h3>
                            <p>+62 887 433 130 86</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Kolom 2: Form Pesan -->
            <div class="column form-column">
                <hr class="divider">
                <h2>Kirim saya pesan</h2>
                <hr class="divider">
                <form id="contactForm" class="contact-form">
                    <input type="text" name="name" placeholder="Nama Anda" required>
                    <input type="email" name="email" placeholder="Email Anda" required>
                    <input type="text" name="subject" placeholder="Judul" required>
                    <textarea name="message" placeholder="Pesan Anda" required></textarea>
                    <button type="submit" class="btn" id="submitBtn">Kirim Pesan</button>
                </form>
                  <p id="formStatus" style="margin-top: 12px; font-weight: 500;"></p>
            </div>

            <!-- Kolom 3: Peta -->
            <div class="column form-column">
                <hr class="divider">
                <h2>Lokasi kami</h2>
                <hr class="divider">
                <div class="map-container">
                    <iframe
                        width="100%"
                        height="300"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"
                        src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d15868.838416887245!2d106.532609!3d-6.1024512!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e41ff38cdee3d79%3A0xa8ebc179ed208332!2sWarung%20Emak%20Ati!5e0!3m2!1sid!2sid!4v1783157829397!5m2!1sid!2sid" referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
